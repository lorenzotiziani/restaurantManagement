<div class="d-flex justify-content-between align-items-center">
    
    <div class="d-flex align-items-center gap-2">
        <span class="fs-4">Welcome {{ username }}</span>

        <span class="badge bg-primary">
            {{ ruoloId }}
        </span>
    </div>

    <button class="btn btn-danger" (click)="logout()">
        Logout
    </button>

</div>

<div *ngIf="isGraph; else tableView">
    <div style="display: block; max-width: 700px; margin: auto;">
        <canvas baseChart
                [data]="barChartData"
                [options]="barChartOptions"
                [type]="barChartType">
        </canvas>
        <button class="btn btn-primary mt-3" (click)="toggleView()">Show Table</button>
    </div>

</div>

<ng-template #tableView>
    <div style="display: block;max-width: 700px; margin: auto;">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>Mese</th>
                <th>Vendite</th>
            </tr>
            </thead>
            <tbody>
           
            <tr *ngFor="let label of barChartData.labels; let i = index">
                <td>{{ label }}</td>
                <td>{{ barChartData.datasets[0].data[i] }}</td>
            </tr>
            </tbody>
        </table>
        <button class="btn btn-primary mt-3" (click)="toggleView()">Show Graph</button>
    </div>
</ng-template>
